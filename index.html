<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler PRO MAX v10 SaaS</title>

<style>
body{
  font-family: Arial;
  background: radial-gradient(circle,#0f172a,#020617);
  color:white;
  max-width:900px;
  margin:auto;
  padding:20px;
}

.hero{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

h1{margin:0;font-size:20px}

.sub{
  opacity:0.7;
  font-size:12px;
}

textarea{
  width:100%;
  height:110px;
  border-radius:12px;
  border:none;
  padding:10px;
  font-size:16px;
  margin-top:10px;
}

button{
  background:#22c55e;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:4px;
  font-size:12px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  font-size:11px;
  padding:2px 6px;
  background:#ef4444;
  border-radius:6px;
}

.stats{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 Unicode Styler PRO MAX v10 SaaS</h1>
  <div class="sub">viral text generator • TikTok ready • free SaaS clone</div>
</div>

<textarea id="input" placeholder="Wpisz tekst..."></textarea>

<div>
  <button onclick="generate()">🔥 Generate SaaS</button>
  <button onclick="fixIG()">IG Fix</button>
  <button onclick="autoHook()">⚡ Viral hook</button>
</div>

<div id="out"></div>

<script>

const styles = {
  Bold:{a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
  Italic:{a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
  Script:{a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"}
};

let globalClicks = JSON.parse(localStorage.getItem("clicks")||"{}");

function convert(text,map){
  return text.split('').map(c=>map[c.toLowerCase()]||c).join('');
}

function viralScore(text){
  return Math.min(100, text.length * 2);
}

function generate(){
  const input=document.getElementById("input").value;
  const out=document.getElementById("out");
  out.innerHTML="";

  Object.entries(styles).forEach(([name,map])=>{

    const text=convert(input,map);
    const score=viralScore(text);

    const card=document.createElement("div");
    card.className="card";

    const clicks = globalClicks[name]||0;

    card.innerHTML=`
      <div class="row">
        <b>${name}</b>
        <span class="badge">${score}% VIRAL</span>
      </div>

      <div style="margin:8px 0">${text}</div>

      <div class="stats">
        🔥 kopiowania: ${clicks}
      </div>

      <button>Kopiuj + Share</button>
    `;

    const btn=card.querySelector("button");

    btn.onclick=()=>{
      navigator.clipboard.writeText(text);

      globalClicks[name]=(globalClicks[name]||0)+1;
      localStorage.setItem("clicks",JSON.stringify(globalClicks));

      const shareURL = window.location.href + "?text=" + encodeURIComponent(text);

      toast("Skopiowano + link 🔗");

      setTimeout(()=>{
        navigator.clipboard.writeText(shareURL);
      },300);
    };

    out.appendChild(card);
  });
}

function fixIG(){
  const t=document.getElementById("input");
  t.value=t.value.replace(/\n/g,"\u2063");
  toast("IG FIX ✔");
}

function autoHook(){
  const t=document.getElementById("input");

  const hooks=[
    "TO MUSISZ ZOBACZYĆ 🔥",
    "99% ludzi tego nie wie 👀",
    "Ten trik robi VIRAL ⚡",
    "Zapisz zanim zniknie 🚀"
  ];

  t.value = hooks[Math.floor(Math.random()*hooks.length)] + "\n\n" + t.value;
  toast("Viral hook added");
}

function toast(msg){
  const el=document.createElement("div");
  el.className="toast";
  el.innerText=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

generate();

</script>

</body>
</html>
