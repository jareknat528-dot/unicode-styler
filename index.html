<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Styler PRO MAX</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; max-width: 600px; margin: auto; padding: 20px; }
        h1 { text-align: center; color: #22c55e; }
        textarea { width: 100%; height: 150px; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #1e293b; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; background: #22c55e; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:hover { background: #16a34a; }
        .card { background: #111827; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1f2937; }
        .name { font-size: 10px; opacity: 0.5; text-transform: uppercase; }
        .text { font-size: 18px; word-break: break-all; padding-right: 10px; }
        .copy-btn { background: #3b82f6; width: 80px; padding: 8px; }
    </style>
</head>
<body>

    <h1>🚀 Unicode Styler</h1>
    
    <textarea id="input" placeholder="Wpisz tekst tutaj..."></textarea>

    <div class="buttons">
        <button onclick="generate()">1. GENERUJ STYLE</button>
        <button id="fix-btn" onclick="fixIG()" style="background: #8b5cf6;">2. NAPRAW IG</button>
    </div>

    <div id="output"></div>

    <script>
        const maps = {
            "Bold": {a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
            "Italic": {a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"ᴠ",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
            "Script": {a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"},
            "Glitch": {a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"}
        };

        function generate() {
            const val = document.getElementById("input").value;
            const out = document.getElementById("output");
            out.innerHTML = "";
            if(!val) return alert("Wpisz tekst!");

            Object.entries(maps).forEach(([name, map]) => {
                const converted = val.split('').map(c => {
                    const l = c.toLowerCase();
                    const res = map[l] || c;
                    return c === c.toUpperCase() ? res.toUpperCase() : res;
                }).join('');

                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `<div><div class="name">${name}</div><div class="text">${converted}</div></div>`;
                
                const btn = document.createElement("button");
                btn.className = "copy-btn";
                btn.innerText = "Kopiuj";
                btn.onclick = () => {
                    navigator.clipboard.writeText(converted);
                    btn.innerText = "OK!";
                    setTimeout(() => btn.innerText = "Kopiuj", 1000);
                };
                div.appendChild(btn);
                out.appendChild(div);
            });
        }

        function fixIG() {
            const el = document.getElementById("input");
            if(!el.value) return alert("Wpisz tekst!");
            
            // Naprawa: dodanie niewidzialnego separatora U+2063
            const fixed = el.value.split('\n').join('\u2063\n');
            el.value = fixed;
            
            navigator.clipboard.writeText(fixed).then(() => {
                const b = document.getElementById("fix-btn");
                b.innerText = "SKOPIOWANO! ✅";
                b.style.background = "#10b981";
                setTimeout(() => { b.innerText = "2. NAPRAW IG"; b.style.background = "#8b5cf6"; }, 2000);
            });
        }
    </script>
</body>
</html>
