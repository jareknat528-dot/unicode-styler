<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler PRO MAX v2</title>

<style>
body{
  font-family: 'Inter', Arial, sans-serif;
  background: radial-gradient(circle at top,#1e293b,#0f172a);
  color:white;
  max-width:900px;
  margin:auto;
  padding:20px;
  min-height: 100vh;
}

h1{margin-bottom:5px; letter-spacing: -1px;}
.sub{opacity:0.7; margin-bottom:15px; font-size: 14px;}

textarea{
  width:100%;
  height:120px;
  padding:15px;
  border-radius:12px;
  border: 2px solid #334155;
  background: #1e293b;
  color: white;
  font-size:16px;
  margin-bottom:10px;
  box-sizing: border-box;
  transition: border 0.3s;
}

textarea:focus {
  outline: none;
  border-color: #22c55e;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

button{
  background:#22c55e;
  color: white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover{transform:scale(1.05); filter: brightness(1.1);}
button:active{transform:scale(0.95);}

.preview{
  background: rgba(11, 18, 32, 0.5);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  white-space:pre-wrap;
  border-left: 4px solid #22c55e;
  font-style: italic;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border: 1px solid #1f2937;
}

.name{font-size:11px; opacity:0.5; text-transform: uppercase; letter-spacing: 1px;}
.text{font-size:18px; margin-top: 5px;}

.history{
  margin-top:25px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  font-size:13px;
  opacity:0.8;
}

footer {
  margin-top:40px; 
  font-size:14px; 
  opacity:0.6; 
  line-height:1.6;
  border-top: 1px solid #334155;
  padding-top: 20px;
}
</style>
</head>

<body>

<h1>🚀 Unicode Styler PRO MAX v2</h1>
<div class="sub">Live generator + viral tools</div>

<textarea id="input" placeholder="Wpisz tekst..." oninput="livePreview()"></textarea>

<div class="buttons">
<button onclick="generate()">Generuj style</button>
<button id="btn-fix" onclick="fixIG()">Napraw IG</button>
<button id="btn-auto" onclick="autoDesc()">🤖 Auto opis</button>
<button onclick="exportText()">💾 Eksport</button>
</div>

<div class="preview" id="preview">Podgląd na żywo...</div>

<div id="out"></div>

<div class="history" id="history">Historia pojawi się tutaj...</div>

<script>
const styles={
 Bold:{a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
 Italic:{a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
 Script:{a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"},
 SmallCaps:{a:"ᴀ",b:"ʙ",c:"ᴄ",d:"ᴅ",e:"ᴇ",f:"ғ",g:"ɢ",h:"ʜ",i:"ɪ",j:"ᴊ",k:"ᴋ",l:"ʟ",m:"ᴍ",n:"ɴ",o:"ᴏ",p:"ᴘ",q:"ǫ",r:"ʀ",s:"s",t:"ᴛ",u:"ᴜ",v:"ᴠ",w:"ᴡ",x:"x",y:"ʏ",z:"ᴢ"},
 Glitch:{a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"},
 Double:{a:"𝕒",b:"𝕓",c:"𝕔",d:"𝕕",e:"𝕖",f:"𝕗",g:"𝕘",h:"𝕙",i:"𝕚",j:"𝕛",k:"𝕜",l:"𝕝",m:"𝕞",n:"𝕟",o:"𝕠",p:"𝕡",q:"𝕢",r:"𝕣",s:"𝕤",t:"𝕥",u:"𝕦",v:"𝕧",w:"𝕨",x:"𝕩",y:"𝕪",z:"𝕫"}
};

function convert(t,m){
 return t.split('').map(c=>{
   const lower = c.toLowerCase();
   return m[lower] ? (c === c.toUpperCase() ? m[lower].toUpperCase() : m[lower]) : c;
 }).join('');
}

function livePreview(){
 document.getElementById("preview").innerText = document.getElementById("input").value || "Podgląd na żywo...";
}

function generate(){
 const input=document.getElementById("input").value;
 if(!input) return;
 const out=document.getElementById("out");
 out.innerHTML="";

 Object.entries(styles).forEach(([name,map])=>{
  const text=convert(input,map);
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<div><div class="name">${name}</div><div class="text">${text}</div></div>`;
  const btn=document.createElement("button");
  btn.innerText="Kopiuj";
  btn.onclick=()=>{
    navigator.clipboard.writeText(text);
    saveHistory(text);
    btn.innerText="OK! ✅";
    btn.style.background = "#3b82f6";
    setTimeout(()=>{btn.innerText="Kopiuj"; btn.style.background="";}, 1000);
  };
  div.appendChild(btn);
  out.appendChild(div);
 });
}

function fixIG(){
  const input = document.getElementById("input");
  if(!input.value) return;
  
  // Naprawa: dodanie niewidzialnego znaku przed każdym enterem
  input.value = input.value.replace(/\n/g, "\u2063\n");
  navigator.clipboard.writeText(input.value);
  
  const btn = document.getElementById("btn-fix");
  const oldText = btn.innerText;
  btn.innerText = "NAPRAWIONO I SKOPIOWANO! ✅";
  btn.style.background = "#10b981";
  
  setTimeout(() => {
    btn.innerText = oldText;
    btn.style.background = "";
  }, 2500);
}

function autoDesc(){
 const input=document.getElementById("input");
 let base=input.value.split("🔥")[0].split("✨")[0].trim();
 if(!base) base = "Twój niesamowity post";

 input.value = `🔥 ${base}\n\n✨ viral content\n📈 grow daily\n👇 follow for more`;
 livePreview();
 
 const btn = document.getElementById("btn-auto");
 btn.innerText = "WYGENEROWANO! 🤖";
 btn.style.background = "#8b5cf6";
 setTimeout(() => {
    btn.innerText = "🤖 Auto opis";
    btn.style.background = "";
 }, 2000);
}

function exportText(){
 const content=document.getElementById("out").innerText;
 if(!content) return;
 const blob=new Blob([content],{type:"text/plain"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="unicode-styler-export.txt";
 a.click();
}

function saveHistory(text){
 let h=JSON.parse(localStorage.getItem("history")||"[]");
 if(h[0] === text) return;
 h.unshift(text);
 h=h.slice(0,5);
 localStorage.setItem("history",JSON.stringify(h));
 renderHistory();
}

function renderHistory(){
 let h=JSON.parse(localStorage.getItem("history")||"[]");
 document.getElementById("history").innerText = h.length > 0 ? "Ostatnio skopiowane:\n" + h.join("\n---\n") : "Historia jest pusta";
}

renderHistory();
</script>

<footer>
  <b>Unicode Styler PRO</b> to darmowe narzędzie SEO dla twórców. 
  Generuj pogrubiony tekst na Facebooka, kursywę na Instagram i naprawiaj odstępy w opisach postów, aby zwiększyć zaangażowanie i zasięgi.
</footer>

</body>
</html>
