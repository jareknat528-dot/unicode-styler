<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler PRO MAX v6</title>

<style>
body{
  font-family: Arial;
  background: radial-gradient(circle,#0f172a,#020617);
  color:white;
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2{margin-bottom:10px}

textarea{
  width:100%;
  height:120px;
  border-radius:12px;
  border:none;
  padding:10px;
  font-size:16px;
  margin-bottom:10px;
  outline:none;
}

button{
  background:#22c55e;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
  transition:0.2s;
}

button:active{
  transform:scale(0.96);
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.name{
  font-size:12px;
  opacity:0.7;
  margin-bottom:5px;
}

.text{
  margin-bottom:8px;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🚀 Unicode Styler PRO MAX v6</h2>

<textarea id="input" placeholder="Wpisz tekst..."></textarea>

<div>
  <button onclick="generate()">Generuj</button>
  <button onclick="fixIG()">Napraw IG</button>
  <button onclick="autoDesc()">🤖 Auto opis</button>
</div>

<div id="out"></div>

<script>

const styles = {
  Bold:{a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},

  Italic:{a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},

  Script:{a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"},

  SmallCaps:{a:"ᴀ",b:"ʙ",c:"ᴄ",d:"ᴅ",e:"ᴇ",f:"ғ",g:"ɢ",h:"ʜ",i:"ɪ",j:"ᴊ",k:"ᴋ",l:"ʟ",m:"ᴍ",n:"ɴ",o:"ᴏ",p:"ᴘ",q:"ǫ",r:"ʀ",s:"s",t:"ᴛ",u:"ᴜ",v:"ᴠ",w:"ᴡ",x:"x",y:"ʏ",z:"ᴢ"},

  Double:{a:"𝕒",b:"𝕓",c:"𝕔",d:"𝕕",e:"𝕖",f:"𝕗",g:"𝕘",h:"𝕙",i:"𝕚",j:"𝕛",k:"𝕜",l:"𝕝",m:"𝕞",n:"𝕟",o:"𝕠",p:"𝕡",q:"𝕢",r:"𝕣",s:"𝕤",t:"𝕥",u:"𝕦",v:"𝕧",w:"𝕨",x:"𝕩",y:"𝕪",z:"𝕫"}
};

function convert(text,map){
  return text.split('').map(c=>map[c.toLowerCase()]||c).join('');
}

function generate(){
  const input=document.getElementById("input").value;
  const out=document.getElementById("out");
  out.innerHTML="";

  Object.entries(styles).forEach(([name,map])=>{
    const text=convert(input,map);

    const card=document.createElement("div");
    card.className="card";

    const btnId = Math.random().toString(36).slice(2);

    card.innerHTML=`
      <div class="name">${name}</div>
      <div class="text">${text}</div>
      <button id="${btnId}">Kopiuj</button>
    `;

    const btn = card.querySelector("button");
    btn.onclick=()=>{
      navigator.clipboard.writeText(text);
      btn.innerText="Skopiowano ✔";
      setTimeout(()=>btn.innerText="Kopiuj",1000);
      toast("Skopiowano");
    };

    out.appendChild(card);
  });
}

function fixIG(){
  const t=document.getElementById("input");
  t.value = t.value.replace(/\n/g,"\u2063");
  toast("IG naprawione ✔");
}

function autoDesc(){
  const t=document.getElementById("input");
  t.value = `🔥 ${t.value}\n✨ viral content\n📈 grow daily\n👇 follow`;
  toast("Opis gotowy 🚀");
}

function toast(msg){
  const el=document.createElement("div");
  el.className="toast";
  el.innerText=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

</script>

</body>
</html>
