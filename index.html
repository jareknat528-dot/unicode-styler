<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Styler PRO MAX</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; max-width: 600px; margin: auto; padding: 20px; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #1e293b; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: white; background: #22c55e; }
        #fix-btn { background: #8b5cf6; }
        .card { background: #111827; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1f2937; text-align: left; }
        .name { font-size: 10px; opacity: 0.5; text-transform: uppercase; }
        .text { font-size: 18px; word-break: break-all; }
        .copy { background: #3b82f6; width: 70px; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1 style="color: #22c55e;">🚀 Unicode Styler PRO MAX</h1>
    <p style="opacity: 0.7; font-size: 13px;">Wersja stabilna - Naprawiona</p>
    
    <textarea id="txtInput" placeholder="Wpisz tekst..."></textarea>

    <div class="btn-group">
        <button onclick="runStyles()">1. GENERUJ STYLE</button>
        <button id="fix-btn" onclick="runFix()">2. NAPRAW IG</button>
    </div>

    <div id="results"></div>

    <script>
        // Mapy znaków
        const m = {
            "Bold": {a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"ᴏ",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
            "Italic": {a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
            "Glitch": {a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"}
        };

        function runStyles() {
            const val = document.getElementById("txtInput").value;
            const res = document.getElementById("results");
            res.innerHTML = "";
            if(!val) return alert("Wpisz tekst!");

            for (const [name, map] of Object.entries(m)) {
                const converted = val.split('').map(c => {
                    const l = c.toLowerCase();
                    const r = map[l] || c;
                    return c === c.toUpperCase() ? r.toUpperCase() : r;
                }).join('');

                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `<div><div class="name">${name}</div><div class="text">${converted}</div></div>`;
                
                const b = document.createElement("button");
                b.className = "copy";
                b.innerText = "Kopiuj";
                b.onclick = () => {
                    navigator.clipboard.writeText(converted);
                    b.innerText = "OK!";
                    setTimeout(() => b.innerText = "Kopiuj", 1000);
                };
                div.appendChild(b);
                res.appendChild(div);
            }
        }

        function runFix() {
            const el = document.getElementById("txtInput");
            if(!el.value) return alert("Wpisz tekst!");
            
            const fixed = el.value.split('\n').join('\u2063\n');
            el.value = fixed;
            
            navigator.clipboard.writeText(fixed).then(() => {
                const btn = document.getElementById("fix-btn");
                btn.innerText = "SKOPIOWANO! ✅";
                btn.style.background = "#10b981";
                alert("Naprawiono i skopiowano!");
                setTimeout(() => { 
                    btn.innerText = "2. NAPRAW IG"; 
                    btn.style.background = "#8b5cf6"; 
                }, 2000);
            });
        }
    </script>
</body>
</html>
