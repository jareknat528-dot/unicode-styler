<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler v15 Startup Mode</title>

<style>
body{
  font-family:Arial;
  background: radial-gradient(circle,#0f172a,#020617);
  color:white;
  margin:0;
  display:flex;
  justify-content:center;
}

.app{
  width:900px;
  padding:20px;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
}

.loginBox{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
  width:100%;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  background:#22c55e;
  color:black;
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
}

/* DASHBOARD */
.panel{
  margin-top:10px;
  display:flex;
  gap:10px;
}

textarea{
  width:100%;
  height:100px;
  border:none;
  border-radius:10px;
  padding:10px;
}

.grid{
  margin-top:15px;
  display:grid;
  gap:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
}

.locked{
  opacity:0.5;
  position:relative;
}

.locked::after{
  content:"🔒 PRO";
  position:absolute;
  top:10px;
  right:10px;
  font-size:11px;
  background:red;
  padding:2px 6px;
  border-radius:6px;
}

.small{
  font-size:11px;
  opacity:0.7;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="loginBox">
    <h3>🚀 Unicode Styler v15</h3>
    <input id="user" placeholder="username">
    <input id="pass" placeholder="password" type="password">
    <button onclick="login()">Login (FREE)</button>
    <div class="small">No backend • demo mode</div>
  </div>
</div>

<div class="app" id="app" style="display:none">

  <div class="top">
    <h3>🚀 Startup Dashboard</h3>
    <div class="badge">FREE SaaS MODE</div>
  </div>

  <textarea id="input" placeholder="Wpisz tekst..."></textarea>

  <div class="panel">
    <button onclick="fixIG()">IG FIX</button>
    <button onclick="hook()">VIRAL HOOK</button>
    <button onclick="exportText()">EXPORT</button>
    <button onclick="upgrade()">UPGRADE PRO</button>
  </div>

  <div class="grid" id="out"></div>

</div>

<script>

const styles={
  Bold:{a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
  Italic:{a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
  Script:{a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"},
  Glitch:{a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"}
};

let pro=false;

function convert(t,m){
  return t.split('').map(c=>m[c.toLowerCase()]||c).join('');
}

/* LOGIN */
function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  toast("Welcome 👋");
  render();
}

/* RENDER */
function render(){
  const input=document.getElementById("input").value;
  const out=document.getElementById("out");
  out.innerHTML="";

  Object.entries(styles).forEach(([name,map])=>{

    const text=convert(input,map);

    const card=document.createElement("div");
    card.className="card";

    if(!pro && name==="Glitch"){
      card.classList.add("locked");
    }

    card.innerHTML=`
      <b>${name}</b>
      <div style="margin:8px 0">${text}</div>
      <button>Copy</button>
    `;

    card.querySelector("button").onclick=()=>{
      if(!pro && name==="Glitch"){
        toast("PRO feature 🔒");
        return;
      }
      navigator.clipboard.writeText(text);
      toast("Copied ✔");
    };

    out.appendChild(card);
  });
}

/* IG FIX */
function fixIG(){
  const t=document.getElementById("input");
  t.value=t.value.replace(/\n/g,"\u2063");
  toast("IG FIX ✔");
}

/* VIRAL HOOK */
function hook(){
  const t=document.getElementById("input");
  t.value="🚀 VIRAL MODE ON\n\n"+t.value;
  toast("Hook added ✔");
}

/* EXPORT */
function exportText(){
  navigator.clipboard.writeText(document.getElementById("input").value);
  toast("Exported ✔");
}

/* UPGRADE FAKE */
function upgrade(){
  pro=true;
  toast("PRO unlocked (demo) 🔥");
  render();
}

/* TOAST */
function toast(m){
  const el=document.createElement("div");
  el.className="toast";
  el.innerText=m;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

</script>

</body>
</html>
