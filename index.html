<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler PRO MAX v2</title>
<style>
body{font-family:sans-serif;background:radial-gradient(circle at top,#1e293b,#0f172a);color:white;max-width:900px;margin:auto;padding:20px;min-height:100vh}
h1{margin-bottom:5px}
.sub{opacity:0.7;margin-bottom:15px;font-size:14px}
textarea{width:100%;height:120px;padding:15px;border-radius:12px;border:2px solid #334155;background:#1e293b;color:white;font-size:16px;margin-bottom:10px;box-sizing:border-box}
.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
button{background:#22c55e;color:white;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:bold;transition:0.2s}
button:hover{transform:scale(1.05)}
.preview{background:rgba(11,18,32,0.5);padding:15px;border-radius:12px;margin-bottom:15px;white-space:pre-wrap;border-left:4px solid #22c55e}
.card{background:#111827;padding:15px;border-radius:12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #1f2937}
.name{font-size:11px;opacity:0.5;text-transform:uppercase}
.text{font-size:18px;margin-top:5px}
.history{margin-top:25px;padding:15px;background:rgba(255,255,255,0.05);border-radius:12px;font-size:13px;opacity:0.8}
</style>
</head>
<body>

<h1>🚀 Unicode Styler PRO MAX v2</h1>
<div class="sub">Live generator + viral tools</div>

<textarea id="input" placeholder="Wpisz tekst..." oninput="livePreview()"></textarea>

<div class="buttons">
<button onclick="generate()">Generuj style</button>
<button id="btn-fix" onclick="fixIG()">Napraw IG</button>
<button id="btn-auto" onclick="autoDesc()">🤖 Auto opis</button>
</div>

<div class="preview" id="preview">Podgląd na żywo...</div>
<div id="out"></div>
<div class="history" id="history"></div>

<script>
const styles={
 Bold:{a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
 Italic:{a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"ᴠ",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
 Glitch:{a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"}
};

function convert(t,m){
 return t.split('').map(c=>{
  const l=c.toLowerCase();
  return m[l] ? (c===c.toUpperCase() ? m[l].toUpperCase() : m[l]) : c;
 }).join('');
}

function livePreview(){
 document.getElementById("preview").innerText = document.getElementById("input").value || "Podgląd na żywo...";
}

function generate(){
 const input=document.getElementById("input").value;
 if(!input) return;
 const out=document.getElementById("out");
 out.innerHTML="";
 Object.entries(styles).forEach(([name,map])=>{
  const text=convert(input,map);
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<div><div class="name">${name}</div><div class="text">${text}</div></div>`;
  const btn=document.createElement("button");
  btn.innerText="Kopiuj";
  btn.onclick=()=>{
   navigator.clipboard.writeText(text);
   btn.innerText="OK! ✅";
   setTimeout(()=>{btn.innerText="Kopiuj"},1000);
  };
  div.appendChild(btn);
  out.appendChild(div);
 });
}

function fixIG(){
 const input = document.getElementById("input");
 if(!input.value) return;
 input.value = input.value.replace(/\n/g, "\u2063\n");
 navigator.clipboard.writeText(input.value);
 const btn = document.getElementById("btn-fix");
 btn.innerText = "NAPRAWIONO I SKOPIOWANO! ✅";
 btn.style.background = "#10b981";
 setTimeout(() => { btn.innerText = "Napraw IG"; btn.style.background = ""; }, 2000);
}

function autoDesc(){
 const input=document.getElementById("input");
 let val = input.value || "Twój post";
 input.value = `🔥 ${val}\n\n✨ viral content\n📈 grow daily\n👇 follow for more`;
 livePreview();
 const btn = document.getElementById("btn-auto");
 btn.innerText = "GOTOWE! 🤖";
 setTimeout(() => { btn.innerText = "🤖 Auto opis"; }, 2000);
}
</script>

<footer style="margin-top:40px;opacity:0.5;font-size:12px">
 Unicode Styler PRO - Generator czcionek i naprawa opisów Instagram.
</footer>

</body>
</html>
