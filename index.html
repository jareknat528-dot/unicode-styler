
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unicode Styler LEVEL 3</title>
  <meta name="google-site-verification" content="4NAb63Sn3JtnafezxwVc3So4PqF46mRxANANaItmuJs" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:white; padding:20px; max-width:900px; margin:auto; }
    textarea { width:100%; height:110px; border-radius:12px; border:none; padding:12px; font-size:16px; margin-bottom:15px; }
    .buttons { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
    button { padding:10px 14px; border-radius:10px; border:none; cursor:pointer; background:#22c55e; color:black; font-weight:600; }
    .preview,.history { background:#020617; padding:12px; border-radius:12px; margin-bottom:15px; white-space:pre-wrap; }
    .output { background:#020617; margin-top:10px; padding:12px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
    .badge { font-size:12px; opacity:0.6; }
    select { padding:10px; border-radius:10px; border:none; }
  </style>
</head>
<body>

<h2>🚀 Unicode Styler LEVEL 3</h2>

<textarea id="input" placeholder="Wpisz tekst..."></textarea>

<div class="buttons">
  <button onclick="generateStyles()">Generuj</button>
  <button onclick="fixIG()">Napraw IG</button>
  <button onclick="generateAI()">🤖 Auto opis</button>
  <button onclick="downloadText()">💾 Eksport</button>
</div>

<div class="preview" id="preview"></div>

<h3>Historia:</h3>
<div class="history" id="history"></div>

<div id="results"></div>

<script>
const styles = {
  Bold: { a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇" },
  Italic: { a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻" }
};

let historyList = [];

function transform(text, map) {
  return text.split('').map(c => map[c.toLowerCase()] || c).join('');
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  historyList.unshift(text);
  updateHistory();
}

function updateHistory() {
  document.getElementById("history").textContent = historyList.slice(0,5).join("\n---\n");
}

function generateStyles() {
  const input = document.getElementById("input").value;
  const results = document.getElementById("results");
  const preview = document.getElementById("preview");

  results.innerHTML = "";
  preview.textContent = input;

  Object.entries(styles).forEach(([name, map]) => {
    const styled = transform(input, map);

    const box = document.createElement("div");
    box.className = "output";

    const left = document.createElement("div");
    left.innerHTML = `<div class="badge">${name}</div>${styled}`;

    const btn = document.createElement("button");
    btn.textContent = "Kopiuj";
    btn.onclick = () => copyText(styled);

    box.appendChild(left);
    box.appendChild(btn);
    results.appendChild(box);
  });
}

function fixIG() {
  const t = document.getElementById("input");
  t.value = t.value.replace(/\n/g, "\u2063");
}

function generateAI() {
  const text = document.getElementById("input").value;
  const generated = `🔥 ${text}\n\n✨ Nie przegap tego\n📈 Rozwijaj się codziennie\n👇 Follow for more`;
  document.getElementById("preview").textContent = generated;
}

function downloadText() {
  const content = document.getElementById("preview").textContent;
  const blob = new Blob([content], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tekst.txt";
  a.click();
}
</script>

</body>
</html>
