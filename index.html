<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler PRO MAX v2</title>
<style>
    body { font-family: sans-serif; background: radial-gradient(circle at top,#1e293b,#0f172a); color: white; max-width: 800px; margin: auto; padding: 20px; }
    textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #1e293b; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
    .buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    button { background: #22c55e; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .card { background: #111827; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1f2937; }
    .name { font-size: 11px; opacity: 0.5; text-transform: uppercase; }
    .text { font-size: 18px; }
</style>
</head>
<body>

<h1>🚀 Unicode Styler PRO MAX v2</h1>
<textarea id="input" placeholder="Wpisz tekst i naciśnij Enter kilka razy..."></textarea>

<div class="buttons">
    <button onclick="generateStyles()">1. Generuj Style</button>
    <button id="btn-fix" onclick="fixInstagram()">2. Napraw IG (Entery)</button>
</div>

<div id="output"></div>

<script>
const styleMaps = {
    "Bold": {a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
    "Italic": {a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
    "Script": {a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"},
    "Glitch": {a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"}
};

function applyMap(text, map) {
    return text.split('').map(char => {
        const lower = char.toLowerCase();
        if (map[lower]) {
            return char === char.toUpperCase() ? map[lower].toUpperCase() : map[lower];
        }
        return char;
    }).join('');
}

function generateStyles() {
    const input = document.getElementById("input").value;
    const container = document.getElementById("output");
    container.innerHTML = "";
    
    if(!input) { alert("Wpisz najpierw tekst!"); return; }

    Object.entries(styleMaps).forEach(([name, map]) => {
        const transformed = applyMap(input, map);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<div><div class="name">${name}</div><div class="text">${transformed}</div></div>`;
        
        const btn = document.createElement("button");
        btn.innerText = "Kopiuj";
        btn.onclick = () => {
            navigator.clipboard.writeText(transformed);
            btn.innerText = "OK!";
            setTimeout(() => btn.innerText = "Kopiuj", 1000);
        };
        card.appendChild(btn);
        container.appendChild(card);
    });
}

function fixInstagram() {
    const area = document.getElementById("input");
    if(!area.value) { alert("Wpisz tekst z enterami!"); return; }

    // KLUCZ: Dodajemy niewidzialny znak separatora przed każdym nowym wierszem
    const fixedText = area.value.split('\n').join('\u2063\n');
    area.value = fixedText;
    
    navigator.clipboard.writeText(fixedText).then(() => {
        const btn = document.getElementById("btn-fix");
        btn.innerText = "SKOPIOWANO DO IG! ✅";
        btn.style.background = "#10b981";
        alert("Magia działa! Tekst ze specjalnymi znakami jest w schowku. Wklej go teraz na Instagram.");
        setTimeout(() => { btn.innerText = "2. Napraw IG (Entery)"; btn.style.background = ""; }, 3000);
    });
}
</script>
</body>
</html>
