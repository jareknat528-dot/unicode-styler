<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler v16.5 CLEAN</title>

<style>
body{
  font-family: Arial;
  background: radial-gradient(circle,#0f172a,#020617);
  color:white;
  max-width:900px;
  margin:auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  background:#22c55e;
  color:black;
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
}

textarea{
  width:100%;
  height:110px;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
  font-size:14px;
  outline:none;
}

button{
  background:#22c55e;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:4px 0;
}

.panel{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
}

.small{
  font-size:11px;
  opacity:0.7;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top">
  <h3>🚀 Unicode Styler v16.5</h3>
  <div class="badge">FREE CLEAN MODE</div>
</div>

<textarea id="input" placeholder="Wpisz tekst..."></textarea>

<div class="panel">
  <button onclick="fixIG()">IG FIX</button>
  <button onclick="hook()">VIRAL HOOK</button>
</div>

<div id="out"></div>

<script>

const styles = {
  Bold:{
    a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"
  },

  Italic:{
    a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"
  },

  Script:{
    a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"
  },

  Glitch:{
    a:"a̷",b:"b̷",c:"c̷",d:"d̷",e:"e̷",f:"f̷",g:"g̷",h:"h̷",i:"i̷",j:"j̷",k:"k̷",l:"l̷",m:"m̷",n:"n̷",o:"o̷",p:"p̷",q:"q̷",r:"r̷",s:"s̷",t:"t̷",u:"u̷",v:"v̷",w:"w̷",x:"x̷",y:"y̷",z:"z̷"
  }
};

function convert(text,map){
  return text.split('').map(c=>map[c.toLowerCase()]||c).join('');
}

function render(){
  const input=document.getElementById("input").value;
  const out=document.getElementById("out");

  out.innerHTML="";

  Object.entries(styles).forEach(([name,map])=>{

    const text=convert(input,map);

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <b>${name}</b>
      <div style="margin:8px 0">${text}</div>
      <button>Kopiuj</button>
    `;

    card.querySelector("button").onclick=()=>{
      navigator.clipboard.writeText(text);
      toast("Skopiowano ✔");
    };

    out.appendChild(card);
  });
}

/* IG FIX */
function fixIG(){
  const t=document.getElementById("input");
  t.value=t.value.replace(/\n/g,"\u2063");
  toast("IG FIX ✔");
}

/* VIRAL HOOK */
function hook(){
  const t=document.getElementById("input");
  t.value="🚀 VIRAL MODE\n\n"+t.value;
  toast("Hook added ✔");
}

/* TOAST */
function toast(msg){
  const el=document.createElement("div");
  el.className="toast";
  el.innerText=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

/* LIVE UPDATE */
document.getElementById("input").addEventListener("input",render);

render();

</script>

</body>
</html>
