<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Unicode Styler PRO</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 100px; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #22c55e; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 5px; }
        .card { background: #1e293b; padding: 10px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h1>🚀 Styler PRO</h1>
    <textarea id="input" placeholder="Wpisz tekst..."></textarea>
    
    <button onclick="generuj()">1. GENERUJ STYLE</button>
    <button onclick="napraw()" style="background: #8b5cf6;">2. NAPRAW IG (COPY)</button>

    <div id="output"></div>

    <script>
        const styleMap = {a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"};

        function generuj() {
            const txt = document.getElementById("input").value;
            const out = document.getElementById("output");
            out.innerHTML = "";
            if(!txt) return;

            const boldTxt = txt.split('').map(c => styleMap[c.toLowerCase()] || c).join('');
            
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<span>Bold: ${boldTxt}</span>`;
            const btn = document.createElement("button");
            btn.innerText = "Kopiuj";
            btn.style.width = "80px";
            btn.onclick = () => {
                navigator.clipboard.writeText(boldTxt);
                btn.innerText = "OK";
            };
            div.appendChild(btn);
            out.appendChild(div);
        }

        function napraw() {
            const el = document.getElementById("input");
            const fixed = el.value.split('\n').join('\u2063\n');
            el.value = fixed;
            navigator.clipboard.writeText(fixed);
            alert("Naprawiono i skopiowano!");
        }
    </script>
</body>
</html>
