<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Styler CLEAN FIX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  max-width:900px;
  margin:auto;
  padding:20px;
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  font-size:16px;
}

button{
  background:#22c55e;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{opacity:0.7;font-size:12px}
</style>
</head>

<body>

<h2>🚀 Unicode Styler FIX</h2>

<textarea id="input"></textarea>

<button onclick="generate()">Generuj</button>
<button onclick="fixIG()">Napraw IG</button>
<button onclick="autoDesc()">Auto opis</button>

<div id="out"></div>

<script>

const styles = {
Bold:{a:"𝗮",b:"𝗯",c:"𝗰",d:"𝗱",e:"𝗲",f:"𝗳",g:"𝗴",h:"𝗵",i:"𝗶",j:"𝗷",k:"𝗸",l:"𝗹",m:"𝗺",n:"𝗻",o:"𝗼",p:"𝗽",q:"𝗾",r:"𝗿",s:"𝘀",t:"𝘁",u:"𝘂",v:"𝘃",w:"𝘄",x:"𝘅",y:"𝘆",z:"𝘇"},
Italic:{a:"𝘢",b:"𝘣",c:"𝘤",d:"𝘥",e:"𝘦",f:"𝘧",g:"𝘨",h:"𝘩",i:"𝘪",j:"𝘫",k:"𝘬",l:"𝘭",m:"𝘮",n:"𝘯",o:"𝘰",p:"𝘱",q:"𝘲",r:"𝘳",s:"𝘴",t:"𝘵",u:"𝘶",v:"𝘷",w:"𝘸",x:"𝘹",y:"𝘺",z:"𝘻"},
Script:{a:"𝓪",b:"𝓫",c:"𝓬",d:"𝓭",e:"𝓮",f:"𝓯",g:"𝓰",h:"𝓱",i:"𝓲",j:"𝓳",k:"𝓴",l:"𝓵",m:"𝓶",n:"𝓷",o:"𝓸",p:"𝓹",q:"𝓺",r:"𝓻",s:"𝓼",t:"𝓽",u:"𝓾",v:"𝓿",w:"𝔀",x:"𝔁",y:"𝔂",z:"𝔃"}
};

function convert(t,map){
  return t.split('').map(c=>map[c.toLowerCase()]||c).join('');
}

function generate(){
  const input=document.getElementById("input").value;
  const out=document.getElementById("out");
  out.innerHTML="";

  Object.entries(styles).forEach(([name,map])=>{
    const text=convert(input,map);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <div class="badge">${name}</div>
        <div>${text}</div>
      </div>
    `;

    out.appendChild(div);
  });
}

function fixIG(){
  const t=document.getElementById("input");
  t.value=t.value.replace(/\n/g,"\u2063");
}

function autoDesc(){
  const t=document.getElementById("input");
  t.value=`🔥 ${t.value}\n✨ viral content\n📈 grow daily`;
}

</script>

</body>
</html>
